name: Build Windows MSI
 
# ------------------------------------------------------------------ #
#  ADAPT: Replace every occurrence of the following placeholders:     #
#    MyApp      → your app name  (e.g. MyCoolApp)                     #
#    app.spec   → your PyInstaller spec file name                     #
#    MyApp.exe  → your built executable name                         #
# ------------------------------------------------------------------ #
 
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
 
jobs:
  build-msi:
    runs-on: windows-latest
 
    steps:
      # ── 1. Source code ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
 
      # ── 2. Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies and PyInstaller
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
 
      # ── 3. WiX Toolset v3 ────────────────────────────────────────
      #  Chocolatey is pre-installed on all GitHub-hosted Windows runners.
      #  The bin path is discovered dynamically so it works even if the
      #  WiX patch version changes (e.g. 3.11 → 3.14).
      - name: Install WiX Toolset v3
        shell: bash
        run: |
          choco install wixtoolset -y
          WIX_BIN=$(ls -d "/c/Program Files (x86)/WiX Toolset"*/bin 2>/dev/null | head -1)
          echo "$WIX_BIN" >> "$GITHUB_PATH"
 
      # ── 4. Version ───────────────────────────────────────────────
      #  On a version tag (v1.2.3) the MSI version becomes 1.2.3.
      #  On any branch push / PR it defaults to 1.0.0 so WiX never
      #  rejects a non-numeric pre-release string.
      - name: Extract version from git tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=1.0.0" >> "$GITHUB_OUTPUT"
          fi
 
      # ── 5. Build EXE ─────────────────────────────────────────────
      #  ADAPT: change app.spec to your spec file name.
      - name: Build EXE with PyInstaller
        shell: bash
        run: |
          pyinstaller app.spec --noconfirm
 
      # ── 6. Detect PyInstaller output layout ──────────────────────
      #  PyInstaller ≥ 6.0  →  dist/app/_internal   (new layout)
      #  PyInstaller < 6.0  →  dist/app              (old layout)
      #  ADAPT: replace "app" with your app name if it differs from
      #  the name= value in your .spec file.
      - name: Detect PyInstaller output layout
        id: layout
        shell: bash
        run: |
          if [ -d "dist/app/_internal" ]; then
            echo "INTERNAL_DIR=dist/app/_internal" >> "$GITHUB_OUTPUT"
            echo "Detected PyInstaller >= 6 layout: dist/app/_internal"
          else
            echo "INTERNAL_DIR=dist/app" >> "$GITHUB_OUTPUT"
            echo "Detected PyInstaller < 6 layout: dist/app"
          fi
 
      # ── 7. Inject version into installer.wxs ─────────────────────
      #  Your installer.wxs must contain the literal token:
      #    Version="DEPLOY_VERSION_TOKEN"
      #  This step replaces it with the real version at build time.
      #  Using a named token (not a regex) makes the replacement safe
      #  and explicit — it fails loudly if the token is missing.
      - name: Inject version into installer.wxs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $file    = "packaging/msi/installer.wxs"
          $content = Get-Content $file -Raw
          if ($content -notmatch 'Version="DEPLOY_VERSION_TOKEN"') {
            Write-Error "Version token not found in $file — add Version=`"DEPLOY_VERSION_TOKEN`" to the <Product> element."
            exit 1
          }
          $content = $content.Replace('Version="DEPLOY_VERSION_TOKEN"', "Version=`"$version`"")
          Set-Content $file $content
          Write-Host "Injected version $version into $file"
 
      # ── 8. Harvest dependency files ──────────────────────────────
      #  heat auto-generates HarvestedFiles.wxs by scanning the
      #  PyInstaller output folder. It is regenerated on every CI run
      #  so you do NOT commit HarvestedFiles.wxs to your repository.
      #
      #  Flags explained:
      #    -cg  InternalComponentGroup   component group ID referenced
      #                                  in installer.wxs Feature block
      #    -dr  INSTALLDIR               directory ref from installer.wxs
      #    -gg                           generate GUIDs for each component
      #    -g1                           generate one component per file
      #    -sfrag                        suppress Fragment element wrapper
      #    -sreg                         suppress registry harvesting
      #    -srd                          suppress root directory component
      #    -var var.SourceDir            emit $(var.SourceDir)\file paths
      #                                  so candle can resolve them via
      #                                  the -dSourceDir switch below
      - name: Harvest dependency files with heat
        shell: bash
        run: |
          heat dir "${{ steps.layout.outputs.INTERNAL_DIR }}" \
            -cg InternalComponentGroup \
            -dr INSTALLDIR \
            -gg -g1 -sfrag -sreg -srd \
            -var var.SourceDir \
            -out packaging/msi/HarvestedFiles.wxs
 
      # ── 9. Compile WiX sources ───────────────────────────────────
      #  -dSourceDir must point to the same folder passed to heat.
      #  candle turns both .wxs files into .wixobj object files.
      - name: Compile WiX source files with candle
        shell: bash
        run: |
          candle \
            -dSourceDir="${{ steps.layout.outputs.INTERNAL_DIR }}" \
            packaging/msi/installer.wxs \
            packaging/msi/HarvestedFiles.wxs
 
      # ── 10. Link into MSI ─────────────────────────────────────────
      #  light links both .wixobj files into the final .msi.
      #  WixUIExtension provides the built-in installer UI dialogs.
      #  ADAPT: change MyApp.msi to your app name.
      - name: Link object files into MSI with light
        shell: bash
        run: |
          light installer.wixobj HarvestedFiles.wixobj \
            -o MyApp.msi \
            -ext WixUIExtension
 
      # ── 11. Sign MSI (tag pushes only) ───────────────────────────
      #  Signing only runs when a version tag is pushed (v*.*.*).
      #  Required secrets (set in repo Settings → Secrets):
      #    WINDOWS_CERTIFICATE_BASE64   base64-encoded .pfx file
      #    WINDOWS_CERTIFICATE_PASSWORD password for the .pfx
      #  ADAPT: change MyApp.msi to your app name.
      - name: Sign MSI (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.pfx
          signtool sign /fd SHA256 /f certificate.pfx /p "$CERTIFICATE_PASSWORD" \
            /tr http://timestamp.digicert.com /td SHA256 \
            MyApp.msi
          rm certificate.pfx
 
      # ── 12. Upload artifact ───────────────────────────────────────
      #  The .msi is uploaded as a workflow artifact visible in the
      #  Actions Summary. Retained for 30 days.
      #  ADAPT: change MyApp in both name and path.
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-msi-${{ github.ref_name }}
          path: MyApp.msi
          retention-days: 30