name: Build Windows MSI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  build-msi:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and PyInstaller
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install WiX Toolset v3
        shell: bash
        run: |
          choco install wixtoolset -y
          WIX_BIN=$(ls -d "/c/Program Files (x86)/WiX Toolset"*/bin 2>/dev/null | head -1)
          echo "$WIX_BIN" >> "$GITHUB_PATH"

      - name: Extract version from git tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=DEPLOY_VERSION_TOKEN" >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------------------------
      # ADAPT: Change "app.spec" to your actual PyInstaller spec file.
      #        The output folder name must match what is set in the spec
      #        (e.g. name="app" → dist/app/).
      # ---------------------------------------------------------------
      - name: Build EXE with PyInstaller
        shell: bash
        run: |
          pyinstaller app.spec --noconfirm

      # ---------------------------------------------------------------
      # Uses a unique token (DEPLOY_VERSION_TOKEN) instead of a regex
      # so the replacement is safe and explicit.
      # Your installer.wxs must contain exactly: Version="DEPLOY_VERSION_TOKEN"
      # ---------------------------------------------------------------
      - name: Inject version into installer.wxs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content "packaging/msi/installer.wxs" -Raw
          $content = $content.Replace('Version="DEPLOY_VERSION_TOKEN"', "Version=`"$version`"")
          Set-Content "packaging/msi/installer.wxs" $content
          if ($content -notmatch [regex]::Escape("Version=`"$version`"")) {
            Write-Error "Version injection failed — token not found in installer.wxs"
            exit 1
          }

      # ---------------------------------------------------------------
      # ADAPT: Change "dist/app/_internal" to match your PyInstaller
      #        output folder if your app name differs.
      #
      # -var var.SourceDir tells heat to emit $(var.SourceDir)\filename
      # instead of SourceDir\filename, so candle can resolve the paths
      # correctly via -dSourceDir.
      # ---------------------------------------------------------------
      - name: Harvest dependency files with heat
        shell: bash
        run: |
          heat dir dist/app/_internal \
            -cg InternalComponentGroup \
            -dr INSTALLDIR \
            -gg -g1 -sfrag -sreg -srd \
            -var var.SourceDir \
            -out packaging/msi/HarvestedFiles.wxs

      # ---------------------------------------------------------------
      # -dSourceDir must point to the same folder passed to heat above.
      # ---------------------------------------------------------------
      - name: Compile WiX source files with candle
        shell: bash
        run: |
          candle \
            -dSourceDir="dist/app/_internal" \
            packaging/msi/installer.wxs \
            packaging/msi/HarvestedFiles.wxs

      - name: Link object files into MSI with light
        shell: bash
        run: |
          light installer.wixobj HarvestedFiles.wixobj \
            -o MyApp.msi \
            -ext WixUIExtension

      - name: Sign MSI (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.pfx
          signtool sign /fd SHA256 /f certificate.pfx /p "$CERTIFICATE_PASSWORD" \
            /tr http://timestamp.digicert.com /td SHA256 \
            MyApp.msi
          rm certificate.pfx

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-msi-${{ github.ref_name }}
          path: MyApp.msi
          retention-days: 30
